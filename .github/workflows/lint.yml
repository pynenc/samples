# Runs pre-commit hooks (ruff lint, ruff format, trailing whitespace, etc.)
name: Lint

on:
    push:
        branches: [main]
    pull_request:
        branches: [main]
    workflow_dispatch:

jobs:
    lint:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - uses: actions/setup-python@v5
              with:
                  python-version: "3.12"

            - name: Install uv
              uses: astral-sh/setup-uv@v4

            - name: Install dependencies
              run: uv sync

            - name: Run pre-commit
              uses: pre-commit/action@v3.0.1
